services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=host=postgres user=postgres password=postgres dbname=tracker port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  agent:
    build:
      context: ./agent
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    # To get somewhat real host metrics, we might need pid: host, etc.
    # But for demo purposes, we will just run it in the container.
    pid: host

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
